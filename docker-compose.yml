services:
  frontend:
      build: ./frontend
      ports:
        - "3000:3000"
      depends_on:
        - api
  api:
    build:
      context: .
      dockerfile: ./src/Whatsapp.Api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - redis
    env_file:
      - .env
  worker:
    build: 
      context: .
      dockerfile: ./src/Whatsapp.Worker/Dockerfile
    depends_on:
      - redis
    env_file:
      - .env
  redis:
    image: redis:7
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
  evolution:
    container_name: lab_evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped

    depends_on:
      - redis
      - postgres

    ports:
      - "8081:8080"

    env_file:
      - .env
    volumes:
      - evolution-instances:/evolution/instances

volumes:
  redis-data:
  postgres-data:
  evolution-instances: